<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学魔法师 - 海底探险日</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(180deg, #4fc3f7 0%, #0288d1 50%, #01579b 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 气泡动画背景 */
        .bubble {
            position: fixed;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            animation: float-up 8s infinite ease-in;
            pointer-events: none;
        }

        @keyframes float-up {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) scale(1);
                opacity: 0;
            }
        }

        /* 海草装饰 */
        .seaweed {
            position: fixed;
            bottom: 0;
            width: 40px;
            height: 150px;
            background: linear-gradient(to top, #2e7d32, #66bb6a);
            border-radius: 50% 50% 0 0;
            animation: sway 3s ease-in-out infinite;
            transform-origin: bottom;
            opacity: 0.7;
        }

        .seaweed:nth-child(1) { left: 5%; animation-delay: 0s; height: 120px; }
        .seaweed:nth-child(2) { left: 10%; animation-delay: 0.5s; height: 180px; }
        .seaweed:nth-child(3) { right: 8%; animation-delay: 1s; height: 140px; }
        .seaweed:nth-child(4) { right: 15%; animation-delay: 0.3s; height: 160px; }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* 主容器 */
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header h1 {
            font-size: 2.5rem;
            color: #0277bd;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .header .subtitle {
            font-size: 1.2rem;
            color: #546e7a;
        }

        .date-badge {
            display: inline-block;
            background: #ff7043;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 1rem;
            margin-top: 10px;
        }

        /* 计分板 */
        .score-board {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
            z-index: 100;
            font-size: 1.3rem;
            font-weight: bold;
            color: #0277bd;
        }

        .score-board .star {
            color: #ffc107;
            font-size: 1.5rem;
        }

        /* 卡片样式 */
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .card-title {
            font-size: 1.6rem;
            color: #0277bd;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .emoji {
            font-size: 2rem;
        }

        /* 热身游戏 */
        .warmup-content {
            font-size: 1.2rem;
            color: #455a64;
            line-height: 1.8;
        }

        .warmup-instruction {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
            border-left: 5px solid #2196f3;
        }

        .warmup-action {
            display: inline-block;
            background: #4caf50;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            margin: 5px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 题目区域 */
        .questions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .question-item {
            background: #f5f5f5;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .question-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .question-item.correct {
            background: #e8f5e9;
            border-color: #4caf50;
        }

        .question-item.wrong {
            background: #fff3e0;
            border-color: #ff9800;
        }

        .question-number {
            width: 40px;
            height: 40px;
            background: #0277bd;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .question-text {
            font-size: 1.4rem;
            color: #37474f;
            flex: 1;
        }

        .question-input {
            width: 80px;
            height: 50px;
            font-size: 1.5rem;
            text-align: center;
            border: 3px solid #b0bec5;
            border-radius: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .question-input:focus {
            border-color: #2196f3;
            box-shadow: 0 0 10px rgba(33, 150, 243, 0.3);
        }

        .question-input.correct {
            background: #c8e6c9;
            border-color: #4caf50;
            color: #2e7d32;
        }

        .question-input.wrong {
            background: #ffe0b2;
            border-color: #ff9800;
            color: #e65100;
        }

        .feedback-icon {
            font-size: 1.8rem;
            width: 40px;
            text-align: center;
        }

        .feedback-text {
            font-size: 0.9rem;
            color: #4caf50;
            margin-top: 5px;
            font-weight: bold;
        }

        .feedback-text.wrong-text {
            color: #ff9800;
        }

        /* 互动挑战 */
        .challenge-area {
            text-align: center;
        }

        .challenge-description {
            font-size: 1.2rem;
            color: #546e7a;
            margin-bottom: 20px;
        }

        .memory-game {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .memory-card {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            min-height: 80px;
        }

        .memory-card:hover {
            transform: scale(1.05);
        }

        .memory-card.flipped {
            background: white;
            border: 3px solid #667eea;
        }

        .memory-card.matched {
            background: #c8e6c9;
            border-color: #4caf50;
            animation: match-bounce 0.5s ease;
        }

        @keyframes match-bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 成就区域 */
        .achievement-area {
            text-align: center;
            padding: 30px;
        }

        .achievement-badge {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            box-shadow: 0 10px 30px rgba(255, 193, 7, 0.5);
            animation: badge-shine 2s infinite;
        }

        @keyframes badge-shine {
            0%, 100% { box-shadow: 0 10px 30px rgba(255, 193, 7, 0.5); }
            50% { box-shadow: 0 15px 40px rgba(255, 193, 7, 0.8); }
        }

        .achievement-title {
            font-size: 1.8rem;
            color: #f57c00;
            margin-bottom: 10px;
        }

        .achievement-message {
            font-size: 1.2rem;
            color: #546e7a;
            margin-bottom: 20px;
        }

        /* 按钮 */
        .btn {
            padding: 15px 40px;
            font-size: 1.3rem;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: bold;
            min-height: 56px;
            min-width: 150px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #42a5f5 0%, #1976d2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(33, 150, 243, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #ffa726 0%, #f57c00 100%);
            color: white;
            margin-left: 15px;
            box-shadow: 0 5px 15px rgba(255, 152, 0, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 152, 0, 0.5);
        }

        /* 烟花效果 */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confetti-fall 3s ease-out forwards;
            z-index: 1000;
        }

        @keyframes confetti-fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 隐藏状态 */
        .hidden {
            display: none !important;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .header .subtitle {
                font-size: 1rem;
            }

            .score-board {
                top: 10px;
                right: 10px;
                padding: 10px 15px;
                font-size: 1rem;
            }

            .card {
                padding: 20px;
            }

            .card-title {
                font-size: 1.3rem;
            }

            .questions-grid {
                grid-template-columns: 1fr;
            }

            .question-item {
                padding: 15px;
            }

            .question-text {
                font-size: 1.2rem;
            }

            .question-input {
                width: 70px;
                height: 45px;
                font-size: 1.3rem;
            }

            .memory-game {
                grid-template-columns: repeat(4, 1fr);
                gap: 10px;
            }

            .memory-card {
                min-height: 60px;
                font-size: 1.5rem;
            }

            .btn {
                padding: 12px 30px;
                font-size: 1.1rem;
                display: block;
                width: 100%;
                margin: 10px 0;
            }

            .btn-secondary {
                margin-left: 0;
            }

            .seaweed {
                display: none;
            }
        }

        @media (min-width: 601px) and (max-width: 1024px) {
            .container {
                max-width: 700px;
            }

            .questions-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1025px) {
            .container {
                max-width: 960px;
            }
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bubble" style="left: 10%; width: 20px; height: 20px; animation-delay: 0s;"></div>
    <div class="bubble" style="left: 25%; width: 30px; height: 30px; animation-delay: 2s;"></div>
    <div class="bubble" style="left: 40%; width: 15px; height: 15px; animation-delay: 4s;"></div>
    <div class="bubble" style="left: 60%; width: 25px; height: 25px; animation-delay: 1s;"></div>
    <div class="bubble" style="left: 75%; width: 20px; height: 20px; animation-delay: 3s;"></div>
    <div class="bubble" style="left: 90%; width: 35px; height: 35px; animation-delay: 5s;"></div>

    <div class="seaweed"></div>
    <div class="seaweed"></div>
    <div class="seaweed"></div>
    <div class="seaweed"></div>

    <!-- 计分板 -->
    <div class="score-board">
        <span class="star">⭐</span>
        <span id="score">0</span> / <span id="total">8</span>
    </div>

    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <h1>🧜‍♀️ 数学魔法师 🧜‍♂️</h1>
            <p class="subtitle">和海底小动物一起学数学！</p>
            <div class="date-badge">📅 2026年4月16日 星期四</div>
        </div>

        <!-- 热身游戏 -->
        <div class="card">
            <h2 class="card-title"><span class="emoji">🔥</span> 热身小游戏：章鱼体操</h2>
            <div class="warmup-content">
                <div class="warmup-instruction">
                    <p>🐙 小章鱼有8条腿，我们要像章鱼一样活动身体！</p>
                    <p>跟着妈妈/爸爸一起：</p>
                </div>
                <p>
                    <span class="warmup-action">👆 举起双手</span>
                    <span class="warmup-action">👇 放下双手</span>
                    <span class="warmup-action">👈 向左摇摆</span>
                    <span class="warmup-action">👉 向右摇摆</span>
                </p>
                <p style="margin-top: 15px; color: #78909c;">做8次，一边做一边大声数：1、2、3、4、5、6、7、8！</p>
            </div>
        </div>

        <!-- 核心任务 -->
        <div class="card">
            <h2 class="card-title"><span class="emoji">⭐</span> 核心任务：海底数学探险</h2>
            <div class="questions-grid" id="questions-container">
                <!-- 题目将通过JS动态生成 -->
            </div>
        </div>

        <!-- 互动挑战 -->
        <div class="card" id="challenge-card">
            <h2 class="card-title"><span class="emoji">🎮</span> 互动挑战：寻找宝藏</h2>
            <div class="challenge-area">
                <p class="challenge-description">
                    小海龟藏起了宝藏！翻开卡片，找到相同数字的宝藏对。<br>
                    全部找到就能获得神秘奖励！
                </p>
                <div class="memory-game" id="memory-game">
                    <!-- 记忆游戏卡片将通过JS生成 -->
                </div>
            </div>
        </div>

        <!-- 今日成就 -->
        <div class="card hidden" id="achievement-card">
            <div class="achievement-area">
                <div class="achievement-badge" id="badge-emoji">🏆</div>
                <h2 class="achievement-title" id="achievement-title">数学小达人！</h2>
                <p class="achievement-message" id="achievement-message">
                    太棒了！你完成了今天的所有挑战！
                </p>
                <button class="btn btn-primary" onclick="location.reload()">
                    🔄 再玩一次
                </button>
                <button class="btn btn-secondary" onclick="shareAchievement()">
                    📤 分享成就
                </button>
            </div>
        </div>
    </div>

    <script>
        // 音频上下文
        let audioContext = null;

        // 初始化音频
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 播放正确音效（升调）
        function playCorrectSound() {
            initAudio();
            const frequencies = [523.25, 659.25, 783.99];
            const now = audioContext.currentTime;
            
            frequencies.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, now + index * 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + index * 0.1 + 0.3);
                
                oscillator.start(now + index * 0.1);
                oscillator.stop(now + index * 0.1 + 0.3);
            });
        }

        // 播放错误音效（降调）
        function playWrongSound() {
            initAudio();
            const frequencies = [392, 349.23];
            const now = audioContext.currentTime;
            
            frequencies.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.3, now + index * 0.15);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + index * 0.15 + 0.4);
                
                oscillator.start(now + index * 0.15);
                oscillator.stop(now + index * 0.15 + 0.4);
            });
        }

        // 播放胜利音效
        function playWinSound() {
            initAudio();
            const frequencies = [523.25, 659.25, 783.99, 1046.5];
            const now = audioContext.currentTime;
            
            frequencies.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                gainNode.gain.setValueAtTime(0.4, now + index * 0.15);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + index * 0.15 + 0.5);
                
                oscillator.start(now + index * 0.15);
                oscillator.stop(now + index * 0.15 + 0.5);
            });
        }

        // 题目数据 - 第3周：10-20不进位加减法
        const questions = [
            { emoji: '🐠', text: '12 + 3 =', answer: 15, hint: '12条小鱼又来了3条' },
            { emoji: '🦀', text: '15 - 2 =', answer: 13, hint: '15只螃蟹爬走了2只' },
            { emoji: '🐙', text: '11 + 5 =', answer: 16, hint: '11个章鱼宝宝加上5个' },
            { emoji: '🐢', text: '18 - 4 =', answer: 14, hint: '18只海龟游走了4只' },
            { emoji: '🦈', text: '13 + 4 =', answer: 17, hint: '13条鲨鱼又来了4条' },
            { emoji: '🐡', text: '19 - 5 =', answer: 14, hint: '19只河豚飘走了5只' },
            { emoji: '🦑', text: '14 + 2 =', answer: 16, hint: '14只鱿鱼加上2只' },
            { emoji: '🐬', text: '17 - 3 =', answer: 14, hint: '17只海豚游走了3只' }
        ];

        let correctCount = 0;
        const answeredQuestions = new Set();

        // 生成题目
        function generateQuestions() {
            const container = document.getElementById('questions-container');
            
            questions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';
                questionDiv.id = `question-${index}`;
                
                questionDiv.innerHTML = `
                    <div class="question-number">${index + 1}</div>
                    <div class="question-text">
                        ${q.emoji} ${q.text}
                        <div class="feedback-text hidden" id="feedback-${index}"></div>
                    </div>
                    <input type="number" 
                           class="question-input" 
                           id="input-${index}" 
                           data-answer="${q.answer}"
                           data-index="${index}"
                           placeholder="?">
                    <div class="feedback-icon hidden" id="icon-${index}"></div>
                `;
                
                container.appendChild(questionDiv);
                
                // 添加事件监听
                const input = document.getElementById(`input-${index}`);
                input.addEventListener('blur', () => checkAnswer(index));
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        checkAnswer(index);
                    }
                });
            });
        }

        // 检查答案
        function checkAnswer(index) {
            if (answeredQuestions.has(index)) return;
            
            const input = document.getElementById(`input-${index}`);
            const userAnswer = parseInt(input.value);
            const correctAnswer = parseInt(input.dataset.answer);
            const questionDiv = document.getElementById(`question-${index}`);
            const icon = document.getElementById(`icon-${index}`);
            const feedback = document.getElementById(`feedback-${index}`);
            
            if (isNaN(userAnswer)) return;
            
            answeredQuestions.add(index);
            
            if (userAnswer === correctAnswer) {
                // 答对了！
                input.classList.add('correct');
                questionDiv.classList.add('correct');
                icon.textContent = '✅';
                icon.classList.remove('hidden');
                feedback.textContent = '太棒了！🎉';
                feedback.classList.remove('hidden');
                feedback.classList.remove('wrong-text');
                
                playCorrectSound();
                correctCount++;
                updateScore();
                
                // 检查是否全部答对
                if (correctCount === questions.length) {
                    setTimeout(showAchievement, 500);
                }
            } else {
                // 答错了
                input.classList.add('wrong');
                questionDiv.classList.add('wrong');
                icon.textContent = '❌';
                icon.classList.remove('hidden');
                feedback.textContent = `正确答案是 ${correctAnswer}`;
                feedback.classList.remove('hidden');
                feedback.classList.add('wrong-text');
                
                playWrongSound();
                
                // 3秒后允许重新作答
                setTimeout(() => {
                    answeredQuestions.delete(index);
                    input.classList.remove('wrong');
                    questionDiv.classList.remove('wrong');
                    icon.classList.add('hidden');
                    feedback.classList.add('hidden');
                    input.value = '';
                    input.focus();
                }, 3000);
            }
        }

        // 更新分数
        function updateScore() {
            document.getElementById('score').textContent = correctCount;
        }

        // 显示成就
        function showAchievement() {
            playWinSound();
            createConfetti();
            
            document.getElementById('challenge-card').classList.add('hidden');
            document.getElementById('achievement-card').classList.remove('hidden');
            
            // 根据得分显示不同徽章
            const badgeEmoji = document.getElementById('badge-emoji');
            const achievementTitle = document.getElementById('achievement-title');
            const achievementMessage = document.getElementById('achievement-message');
            
            if (correctCount === questions.length) {
                badgeEmoji.textContent = '🏆';
                achievementTitle.textContent = '数学小达人！';
                achievementMessage.textContent = '完美！全部答对！你是今天的数学魔法师！';
            } else if (correctCount >= questions.length * 0.7) {
                badgeEmoji.textContent = '🥈';
                achievementTitle.textContent = '数学小能手！';
                achievementMessage.textContent = `答对了 ${correctCount} 道题，继续加油！`;
            } else {
                badgeEmoji.textContent = '🥉';
                achievementTitle.textContent = '数学小勇士！';
                achievementMessage.textContent = '勇于尝试就是最棒的！再试一次吧！';
            }
            
            // 滚动到成就区域
            document.getElementById('achievement-card').scrollIntoView({ behavior: 'smooth' });
        }

        // 创建烟花效果
        function createConfetti() {
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#f9ca24', '#f0932b', '#eb4d4b', '#6c5ce7', '#00b894'];
            
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 30);
            }
        }

        // 分享成就
        function shareAchievement() {
            const text = `我在数学魔法师海底探险日答对了 ${correctCount}/${questions.length} 道题！快来一起挑战吧！`;
            
            if (navigator.share) {
                navigator.share({
                    title: '数学魔法师',
                    text: text
                });
            } else {
                // 复制到剪贴板
                navigator.clipboard.writeText(text).then(() => {
                    alert('成就已复制到剪贴板，快去分享给爸爸妈妈吧！');
                });
            }
        }

        // 记忆游戏
        function initMemoryGame() {
            const game = document.getElementById('memory-game');
            const numbers = ['3', '5', '7', '9', '3', '5', '7', '9'];
            const emojis = ['🐚', '🦪', '🐡', '🦞', '🐚', '🦪', '🐡', '🦞'];
            
            // 打乱顺序
            const indices = [0, 1, 2, 3, 4, 5, 6, 7].sort(() => Math.random() - 0.5);
            
            let flippedCards = [];
            let matchedPairs = 0;
            
            indices.forEach((originalIndex, displayIndex) => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.index = displayIndex;
                card.dataset.value = numbers[originalIndex];
                card.textContent = '❓';
                
                card.addEventListener('click', () => {
                    if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
                    if (flippedCards.length >= 2) return;
                    
                    // 翻转卡片
                    card.classList.add('flipped');
                    card.textContent = numbers[originalIndex];
                    flippedCards.push(card);
                    
                    if (flippedCards.length === 2) {
                        const [card1, card2] = flippedCards;
                        
                        if (card1.dataset.value === card2.dataset.value) {
                            // 匹配成功
                            setTimeout(() => {
                                card1.classList.add('matched');
                                card2.classList.add('matched');
                                card1.textContent = emojis[indices.indexOf(parseInt(card1.dataset.value) === 3 ? 0 : 
                                    parseInt(card1.dataset.value) === 5 ? 1 :
                                    parseInt(card1.dataset.value) === 7 ? 2 : 3)];
                                card2.textContent = card1.textContent;
                                flippedCards = [];
                                matchedPairs++;
                                playCorrectSound();
                                
                                if (matchedPairs === 4) {
                                    setTimeout(() => {
                                        alert('🎉 恭喜你找到了所有宝藏！');
                                    }, 500);
                                }
                            }, 500);
                        } else {
                            // 匹配失败
                            setTimeout(() => {
                                card1.classList.remove('flipped');
                                card2.classList.remove('flipped');
                                card1.textContent = '❓';
                                card2.textContent = '❓';
                                flippedCards = [];
                                playWrongSound();
                            }, 1000);
                        }
                    }
                });
                
                game.appendChild(card);
            });
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            generateQuestions();
            initMemoryGame();
            
            // 点击页面任意位置初始化音频（解决浏览器自动播放策略）
            document.addEventListener('click', initAudio, { once: true });
        });
    </script>
</body>
</html>
