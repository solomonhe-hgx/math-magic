<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏰 数学魔法城堡 - 2026年4月24日</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #7c3aed;
    --primary-light: #a78bfa;
    --gold: #f59e0b;
    --gold-light: #fbbf24;
    --success: #10b981;
    --success-bg: #d1fae5;
    --error: #f97316;
    --error-bg: #ffedd5;
    --bg: #faf5ff;
    --card-bg: #ffffff;
    --text: #1e1b4b;
    --text-light: #6b7280;
  }

  body {
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Floating stars background */
  .stars-container {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .star {
    position: absolute;
    animation: twinkle 2s ease-in-out infinite alternate;
    font-size: 20px;
    opacity: 0.3;
  }
  @keyframes twinkle {
    0% { opacity: 0.2; transform: scale(0.8) rotate(0deg); }
    100% { opacity: 0.6; transform: scale(1.2) rotate(20deg); }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 960px;
    margin: 0 auto;
    padding: 16px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 20px 16px;
    background: linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #c084fc 100%);
    border-radius: 24px;
    margin-bottom: 16px;
    color: white;
    box-shadow: 0 8px 32px rgba(124, 58, 237, 0.3);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
    animation: shimmer 4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { transform: translate(-30%, -30%); }
    50% { transform: translate(30%, 30%); }
  }
  .header h1 { font-size: 28px; margin-bottom: 4px; position: relative; }
  .header .date { font-size: 14px; opacity: 0.9; position: relative; }
  .header .week-plan {
    display: inline-block;
    margin-top: 8px;
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 6px 16px;
    font-size: 13px;
    position: relative;
  }

  /* Scoreboard */
  .scoreboard {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    background: var(--card-bg);
    border-radius: 16px;
    padding: 12px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    font-size: 18px;
    flex-wrap: wrap;
  }
  .scoreboard .score { font-size: 24px; font-weight: bold; color: var(--primary); }
  .scoreboard .progress-bar {
    width: 120px; height: 10px;
    background: #e5e7eb;
    border-radius: 5px;
    overflow: hidden;
  }
  .scoreboard .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary), var(--gold));
    border-radius: 5px;
    transition: width 0.5s ease;
    width: 0%;
  }

  /* Sections */
  .section {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    border: 2px solid transparent;
    transition: border-color 0.3s;
  }
  .section-title {
    font-size: 22px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title .icon { font-size: 28px; }

  /* Warm-up */
  .warmup-area {
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, #ede9fe, #fae8ff);
    border-radius: 16px;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .warmup-area .instruction {
    font-size: 18px;
    line-height: 1.6;
    color: var(--text);
  }
  .warmup-btn {
    background: linear-gradient(135deg, var(--primary), #a855f7);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 18px;
    cursor: pointer;
    min-width: 44px;
    min-height: 44px;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 16px rgba(124, 58, 237, 0.3);
  }
  .warmup-btn:active { transform: scale(0.95); }
  .warmup-emoji {
    font-size: 64px;
    animation: bounce 0.6s ease infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-15px); }
  }
  .warmup-countdown {
    font-size: 48px;
    font-weight: bold;
    color: var(--primary);
    animation: pulse 0.5s ease;
  }
  @keyframes pulse {
    0% { transform: scale(1.5); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Core problems */
  .problems-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .problem-card {
    background: linear-gradient(135deg, #f5f3ff, #faf5ff);
    border: 2px solid #e9d5ff;
    border-radius: 16px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.3s;
    flex-wrap: wrap;
  }
  .problem-card.correct {
    border-color: var(--success);
    background: var(--success-bg);
  }
  .problem-card.wrong {
    border-color: var(--error);
    background: var(--error-bg);
  }
  .problem-number {
    width: 32px; height: 32px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 14px;
    flex-shrink: 0;
  }
  .problem-text {
    font-size: 22px;
    font-weight: bold;
    flex: 1;
    min-width: 120px;
  }
  .problem-input {
    width: 80px;
    height: 48px;
    border: 2px solid #d1d5db;
    border-radius: 12px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    outline: none;
    transition: all 0.3s;
    min-width: 44px;
  }
  .problem-input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
  }
  .problem-input.correct {
    border-color: var(--success);
    background: #ecfdf5;
    color: var(--success);
  }
  .problem-input.wrong {
    border-color: var(--error);
    background: #fff7ed;
    color: var(--error);
  }
  .problem-feedback {
    font-size: 16px;
    min-width: 80px;
    text-align: center;
    font-weight: bold;
  }
  .problem-feedback.correct { color: var(--success); }
  .problem-feedback.wrong { color: var(--error); }
  .correct-answer {
    font-size: 14px;
    color: var(--text-light);
    margin-top: 4px;
  }

  /* Challenge section */
  .challenge-area {
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border-radius: 16px;
  }
  .challenge-question {
    font-size: 20px;
    margin-bottom: 16px;
    line-height: 1.6;
  }
  .challenge-options {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    max-width: 400px;
    margin: 0 auto;
  }
  .challenge-option {
    background: white;
    border: 2px solid #fbbf24;
    border-radius: 16px;
    padding: 14px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    min-height: 44px;
    transition: all 0.2s;
  }
  .challenge-option:hover { transform: scale(1.05); }
  .challenge-option:active { transform: scale(0.95); }
  .challenge-option.selected-correct {
    background: var(--success-bg);
    border-color: var(--success);
    color: var(--success);
  }
  .challenge-option.selected-wrong {
    background: var(--error-bg);
    border-color: var(--error);
    color: var(--error);
  }
  .challenge-option:disabled {
    opacity: 0.7;
    cursor: not-allowed;
  }

  /* Achievement */
  .achievement-area {
    text-align: center;
    padding: 24px;
    border-radius: 20px;
    display: none;
  }
  .achievement-area.show { display: block; }
  .achievement-area.perfect {
    background: linear-gradient(135deg, #fef3c7, #fde68a, #fbbf24);
  }
  .achievement-area.good {
    background: linear-gradient(135deg, #d1fae5, #a7f3d0);
  }
  .achievement-area.try-again {
    background: linear-gradient(135deg, #ede9fe, #ddd6fe);
  }
  .achievement-badge {
    font-size: 72px;
    margin-bottom: 12px;
    animation: badgePop 0.6s ease;
  }
  @keyframes badgePop {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    60% { transform: scale(1.3) rotate(10deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .achievement-title {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .achievement-desc {
    font-size: 16px;
    color: var(--text-light);
    margin-bottom: 16px;
  }
  .retry-btn {
    background: linear-gradient(135deg, #f59e0b, #f97316);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-size: 18px;
    cursor: pointer;
    min-width: 44px;
    min-height: 44px;
    box-shadow: 0 4px 16px rgba(245, 158, 11, 0.3);
    transition: transform 0.2s;
  }
  .retry-btn:active { transform: scale(0.95); }

  /* Confetti */
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }
  .confetti {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* Responsive */
  @media (max-width: 599px) {
    .wrapper { padding: 10px; }
    .header h1 { font-size: 22px; }
    .section { padding: 14px; border-radius: 16px; }
    .problem-text { font-size: 20px; }
    .problem-input { width: 70px; height: 44px; font-size: 20px; }
    .challenge-options { grid-template-columns: repeat(2, 1fr); }
    .section-title { font-size: 18px; }
    .warmup-emoji { font-size: 48px; }
    .achievement-badge { font-size: 56px; }
  }
  @media (min-width: 600px) and (max-width: 1023px) {
    .wrapper { max-width: 720px; }
    .problems-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 1024px) {
    .wrapper { max-width: 1000px; padding: 24px; }
    .problems-grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Section transitions */
  .section.completed {
    border-color: var(--gold);
  }

  /* Hidden utility */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="stars-container" id="starsContainer"></div>

<div class="wrapper">
  <!-- Header -->
  <div class="header">
    <h1>🏰 数学魔法城堡 🏰</h1>
    <div class="date">📅 2026年4月24日 · 星期五</div>
    <div class="week-plan">📚 第12周：10-20不进位加减法 · 第5天（周五）</div>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard" id="scoreboard">
    <span>⭐ 得分：</span>
    <span class="score" id="scoreDisplay">0 / 0</span>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span id="progressText">0%</span>
  </div>

  <!-- Section 1: Warm-up -->
  <div class="section" id="warmupSection">
    <div class="section-title">
      <span class="icon">🔥</span>
      <span>热身小游戏：魔法数字蹦蹦跳</span>
    </div>
    <div class="warmup-area" id="warmupArea">
      <div class="warmup-emoji">🏰</div>
      <div class="instruction">
        🧙‍♂️ 小魔法师！城堡大门需要你的能量！<br>
        站起来，跟着数字做动作吧！
      </div>
      <button class="warmup-btn" id="warmupBtn" onclick="startWarmup()">✨ 开始魔法热身！</button>
    </div>
  </div>

  <!-- Section 2: Core Problems -->
  <div class="section" id="coreSection">
    <div class="section-title">
      <span class="icon">⭐</span>
      <span>核心任务：解开城堡的数学咒语</span>
    </div>
    <p style="margin-bottom:14px; color:var(--text-light); font-size:15px;">
      🧙‍♂️ 每解开一道题，城堡就会亮起一盏魔法灯哦！填完答案按 <kbd style="background:#e5e7eb;padding:2px 8px;border-radius:4px;font-size:13px;">回车</kbd> 或点其他地方自动检查。
    </p>
    <div class="problems-grid" id="problemsGrid"></div>
  </div>

  <!-- Section 3: Challenge -->
  <div class="section" id="challengeSection">
    <div class="section-title">
      <span class="icon">🎮</span>
      <span>互动挑战：魔法城堡大冒险</span>
    </div>
    <div class="challenge-area" id="challengeArea"></div>
  </div>

  <!-- Section 4: Achievement -->
  <div class="section achievement-area" id="achievementArea">
    <div class="achievement-badge" id="achievementBadge"></div>
    <div class="achievement-title" id="achievementTitle"></div>
    <div class="achievement-desc" id="achievementDesc"></div>
    <button class="retry-btn" onclick="retryAll()">🔄 再试一次</button>
  </div>
</div>

<!-- Confetti container -->
<div class="confetti-container" id="confettiContainer"></div>

<script>
// ============ Audio Context ============
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSound(freqs, type = 'sine', duration = 0.15) {
  try {
    const ctx = getAudioCtx();
    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i * duration);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * duration + duration * 0.9);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime + i * duration);
      osc.stop(ctx.currentTime + i * duration + duration);
    });
  } catch(e) {}
}

function playCorrectSound() {
  playSound([523.25, 659.25, 783.99], 'sine', 0.12);
}

function playWrongSound() {
  playSound([392, 349.23], 'triangle', 0.2);
}

function playCelebrationSound() {
  playSound([523.25, 587.33, 659.25, 783.99, 880, 1046.5], 'sine', 0.15);
}

// ============ Stars Background ============
function createStars() {
  const container = document.getElementById('starsContainer');
  const emojis = ['⭐', '✨', '🌟', '💫', '🔮'];
  for (let i = 0; i < 15; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.animationDuration = (2 + Math.random() * 2) + 's';
    star.style.fontSize = (14 + Math.random() * 16) + 'px';
    container.appendChild(star);
  }
}
createStars();

// ============ State ============
let score = 0;
let totalAnswered = 0;
let totalProblems = 0;
let challengeAnswered = 0;
let challengeTotal = 0;
let coreAnswered = 0;
let coreCorrect = 0;
let challengeCorrect = 0;

function updateScoreboard() {
  const total = totalProblems + challengeTotal;
  const answered = coreAnswered + challengeAnswered;
  const correct = coreCorrect + challengeCorrect;
  document.getElementById('scoreDisplay').textContent = correct + ' / ' + answered;
  const pct = answered > 0 ? Math.round(correct / answered * 100) : 0;
  document.getElementById('progressFill').style.width = (answered > 0 ? (answered / total * 100) : 0) + '%';
  document.getElementById('progressText').textContent = pct + '%';

  // Check if all done
  if (answered === total && total > 0) {
    showAchievement();
  }
}

// ============ Core Problems ============
const problems = [
  // 10以内加减法（复习巩固）- 2题
  { text: '3 + 4 = ?', answer: 7, type: 'core', hint: '🍎 你有3个苹果，又拿到4个，一共有几个？' },
  { text: '9 - 5 = ?', answer: 4, type: 'core', hint: '🐦 树上有9只小鸟，飞走了5只，还剩几只？' },

  // 10-20不进位加法 - 3题
  { text: '12 + 3 = ?', answer: 15, type: 'core', hint: '🏰 城堡里有12面旗子，又挂上3面，共几面？' },
  { text: '14 + 2 = ?', answer: 16, type: 'core', hint: '📖 书架上14本书，又放上去2本，共几本？' },
  { text: '11 + 5 = ?', answer: 16, type: 'core', hint: '🌸 花园里有11朵花，又开了5朵，共几朵？' },

  // 10-20不退位减法 - 3题
  { text: '17 - 4 = ?', answer: 13, type: 'core', hint: '🧙‍♂️ 城堡有17个魔法师，4个出去了，剩几个？' },
  { text: '16 - 3 = ?', answer: 13, type: 'core', hint: '💎 宝箱里16颗宝石，拿出3颗，剩几颗？' },
  { text: '18 - 6 = ?', answer: 12, type: 'core', hint: '🕯️ 城堡18根蜡烛，吹灭6根，还有几根亮着？' },

  // 10以内加减法（熟练）- 2题
  { text: '6 + 2 = ?', answer: 8, type: 'core', hint: '🐉 6条小龙又来了2条，一共几条？' },
  { text: '10 - 3 = ?', answer: 7, type: 'core', hint: '🗝️ 城堡有10把钥匙，用了3把，还剩几把？' },
];

totalProblems = problems.length;

function renderProblems() {
  const grid = document.getElementById('problemsGrid');
  grid.innerHTML = '';
  problems.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'problem-card';
    card.id = 'card-' + i;
    card.innerHTML = `
      <div class="problem-number">${i + 1}</div>
      <div>
        <div class="problem-text">${p.text}</div>
        <div style="font-size:13px;color:var(--text-light);margin-top:4px;">${p.hint}</div>
      </div>
      <input class="problem-input" id="input-${i}" type="number" inputmode="numeric"
             onkeydown="handleEnter(event, ${i})" onblur="checkAnswer(${i})"
             aria-label="第${i+1}题答案" autocomplete="off">
      <div class="problem-feedback" id="feedback-${i}"></div>
    `;
    grid.appendChild(card);
  });
}

function handleEnter(event, index) {
  if (event.key === 'Enter') {
    event.target.blur();
  }
}

function checkAnswer(index) {
  const input = document.getElementById('input-' + index);
  const feedback = document.getElementById('feedback-' + index);
  const card = document.getElementById('card-' + index);
  const val = parseInt(input.value);

  if (input.dataset.checked) return; // already checked

  if (isNaN(val) || input.value.trim() === '') return; // skip empty

  input.dataset.checked = 'true';
  totalAnswered++;
  coreAnswered++;

  if (val === problems[index].answer) {
    input.classList.add('correct');
    card.classList.add('correct');
    feedback.classList.add('correct');
    feedback.innerHTML = '✅ 太棒了！';
    coreCorrect++;
    playCorrectSound();
  } else {
    input.classList.add('wrong');
    card.classList.add('wrong');
    feedback.classList.add('wrong');
    feedback.innerHTML = `❌ 正确答案是 ${problems[index].answer}`;
    playWrongSound();
  }

  input.disabled = true;
  updateScoreboard();
}

renderProblems();

// ============ Warm-up Game ============
const warmupActions = [
  { emoji: '🏃', text: '原地跳 3 下！' },
  { emoji: '🙆', text: '双手举高，比一个大大的 10！' },
  { emoji: '🦩', text: '单脚站立，数到 5！' },
  { emoji: '🤸', text: '转个圈，大声喊出 7 + 2 = ？（答案是9！）' },
  { emoji: '👏', text: '拍 8 下手！' },
];

let warmupIndex = 0;

function startWarmup() {
  warmupIndex = 0;
  showWarmupStep();
}

function showWarmupStep() {
  const area = document.getElementById('warmupArea');
  if (warmupIndex >= warmupActions.length) {
    area.innerHTML = `
      <div class="warmup-emoji">🎉</div>
      <div class="instruction">
        🧙‍♂️ 热身完成！你的魔法能量充满啦！<br>
        准备好解开城堡咒语了吗？
      </div>
    `;
    playCelebrationSound();
    document.getElementById('warmupSection').classList.add('completed');
    return;
  }

  const action = warmupActions[warmupIndex];
  area.innerHTML = `
    <div class="warmup-emoji">${action.emoji}</div>
    <div class="instruction" style="font-size:20px; font-weight:bold;">
      ${action.text}
    </div>
    <div class="warmup-countdown" id="warmupCountdown">5</div>
    <button class="warmup-btn" onclick="nextWarmupStep()">✅ 我做完啦！下一题</button>
  `;

  // Countdown
  let count = 5;
  const countdownEl = document.getElementById('warmupCountdown');
  const timer = setInterval(() => {
    count--;
    if (count > 0) {
      countdownEl.textContent = count;
      countdownEl.style.animation = 'none';
      void countdownEl.offsetWidth;
      countdownEl.style.animation = 'pulse 0.5s ease';
    } else {
      clearInterval(timer);
      countdownEl.textContent = '👍';
    }
  }, 1000);
}

function nextWarmupStep() {
  warmupIndex++;
  showWarmupStep();
}

// ============ Challenge Section ============
const challenges = [
  {
    question: '🏰 城堡里有 <b>12</b> 位魔法师，又来了 <b>5</b> 位。<br>现在一共有几位魔法师？',
    options: ['15', '16', '17', '18'],
    correct: 2
  },
  {
    question: '🔮 魔法球里有 <b>18</b> 颗魔法石，用掉了 <b>4</b> 颗。<br>还剩几颗？',
    options: ['12', '14', '13', '15'],
    correct: 1
  },
  {
    question: '🗝️ 城堡大门密码是：<br><b>10 + 6 - 3 = ?</b><br>密码是多少？',
    options: ['11', '12', '13', '14'],
    correct: 2
  },
  {
    question: '🐉 小龙有 <b>11</b> 颗宝石，又找到 <b>4</b> 颗，送出去 <b>2</b> 颗。<br>现在有几颗？',
    options: ['12', '13', '14', '15'],
    correct: 1
  }
];

challengeTotal = challenges.length;
let challengeIndex = 0;

function renderChallenge() {
  const area = document.getElementById('challengeArea');
  if (challengeIndex >= challenges.length) {
    area.innerHTML = `
      <div style="font-size:48px;">🎊</div>
      <div class="challenge-question">太厉害了！所有挑战都完成啦！</div>
    `;
    document.getElementById('challengeSection').classList.add('completed');
    return;
  }

  const c = challenges[challengeIndex];
  area.innerHTML = `
    <div class="challenge-question">${c.question}</div>
    <div class="challenge-options" id="challengeOptions">
      ${c.options.map((opt, i) => `
        <button class="challenge-option" onclick="checkChallenge(${i}, ${c.correct})" id="copt-${i}">
          ${opt}
        </button>
      `).join('')}
    </div>
    <div id="challengeFeedback" style="margin-top:12px; font-size:16px; min-height:24px;"></div>
  `;
}

function checkChallenge(selected, correct) {
  if (challengeAnswered > challengeIndex) return; // already answered

  challengeAnswered++;
  const feedback = document.getElementById('challengeFeedback');

  // Disable all buttons
  const options = document.querySelectorAll('.challenge-option');
  options.forEach((opt, i) => {
    opt.disabled = true;
    if (i === correct) opt.classList.add('selected-correct');
  });

  if (selected === correct) {
    document.getElementById('copt-' + selected).classList.add('selected-correct');
    feedback.innerHTML = '✅ 正确！你好厉害！🌟';
    feedback.style.color = 'var(--success)';
    challengeCorrect++;
    playCorrectSound();
  } else {
    document.getElementById('copt-' + selected).classList.add('selected-wrong');
    feedback.innerHTML = `❌ 不对哦，正确答案是 ${challenges[challengeIndex].options[correct]}。下次一定行！`;
    feedback.style.color = 'var(--error)';
    playWrongSound();
  }

  // Show next button
  feedback.innerHTML += `<br><button class="warmup-btn" style="margin-top:12px;" onclick="nextChallenge()">
    ${challengeIndex < challenges.length - 1 ? '➡️ 下一题' : '🏆 看成就'}
  </button>`;
}

function nextChallenge() {
  challengeIndex++;
  renderChallenge();
}

renderChallenge();

// ============ Achievement ============
function showAchievement() {
  const area = document.getElementById('achievementArea');
  const total = coreCorrect + challengeCorrect;
  const totalAll = problems.length + challenges.length;
  const badge = document.getElementById('achievementBadge');
  const title = document.getElementById('achievementTitle');
  const desc = document.getElementById('achievementDesc');

  area.classList.add('show');

  if (total === totalAll) {
    area.className = 'section achievement-area show perfect';
    badge.textContent = '🏆';
    title.textContent = '🌟 数学魔法大师！全对！🌟';
    desc.textContent = '恭喜你！城堡里所有的魔法灯都亮起啦！你是最棒的小魔法师！';
    launchConfetti();
    playCelebrationSound();
  } else if (total >= totalAll * 0.7) {
    area.className = 'section achievement-area show good';
    badge.textContent = '🥈';
    title.textContent = '✨ 很棒的魔法师！';
    desc.textContent = `你答对了 ${total} / ${totalAll} 题！城堡亮起了大部分魔法灯，继续加油哦！`;
  } else {
    area.className = 'section achievement-area show try-again';
    badge.textContent = '🪄';
    title.textContent = '💪 继续练习吧！';
    desc.textContent = `你答对了 ${total} / ${totalAll} 题。多练习就会越来越厉害！再试一次吧！`;
  }

  area.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ============ Confetti ============
function launchConfetti() {
  const container = document.getElementById('confettiContainer');
  const colors = ['#f59e0b', '#7c3aed', '#10b981', '#ef4444', '#3b82f6', '#ec4899', '#fbbf24'];

  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const confetti = document.createElement('div');
      confetti.className = 'confetti';
      confetti.style.left = Math.random() * 100 + '%';
      confetti.style.top = '-10px';
      confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      confetti.style.width = (6 + Math.random() * 8) + 'px';
      confetti.style.height = (6 + Math.random() * 8) + 'px';
      confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
      confetti.style.animationDelay = '0s';
      container.appendChild(confetti);

      setTimeout(() => confetti.remove(), 4000);
    }, i * 30);
  }
}

// ============ Retry ============
function retryAll() {
  score = 0;
  totalAnswered = 0;
  coreAnswered = 0;
  coreCorrect = 0;
  challengeAnswered = 0;
  challengeCorrect = 0;
  challengeIndex = 0;

  // Reset scoreboard
  document.getElementById('scoreDisplay').textContent = '0 / 0';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressText').textContent = '0%';

  // Reset achievement
  const area = document.getElementById('achievementArea');
  area.classList.remove('show');
  area.className = 'section achievement-area';

  // Reset sections
  document.getElementById('warmupSection').classList.remove('completed');
  document.getElementById('coreSection').classList.remove('completed');
  document.getElementById('challengeSection').classList.remove('completed');

  // Reset warmup
  document.getElementById('warmupArea').innerHTML = `
    <div class="warmup-emoji">🏰</div>
    <div class="instruction">
      🧙‍♂️ 小魔法师！城堡大门需要你的能量！<br>
      站起来，跟着数字做动作吧！
    </div>
    <button class="warmup-btn" onclick="startWarmup()">✨ 开始魔法热身！</button>
  `;

  // Reset problems
  renderProblems();

  // Reset challenge
  renderChallenge();

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
